<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="connect-src 'self' https://raw.githubusercontent.com data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本 Voxel World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 30%, #4a2c6d 60%, #8b5a8b 100%);
    font-family: 'Georgia', serif;
  }
  
  #canvas-container {
    width: 100%;
    height: 100vh;
    position: relative;
  }
  
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  
  /* UI Overlay */
  #ui-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  
  #title {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffd4d4;
    font-size: 2.5rem;
    text-shadow: 0 0 20px rgba(255, 150, 200, 0.8), 0 0 40px rgba(255, 100, 150, 0.4);
    letter-spacing: 0.3em;
    opacity: 0;
    animation: fadeIn 2s ease 0.5s forwards;
  }
  
  #hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 220, 220, 0.7);
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeIn 2s ease 2s forwards, pulse 3s ease-in-out infinite 4s;
  }
  
  #info-panel {
    position: absolute;
    top: 50%;
    right: 40px;
    transform: translateY(-50%);
    background: rgba(20, 10, 30, 0.85);
    border: 1px solid rgba(255, 180, 200, 0.3);
    border-radius: 12px;
    padding: 20px 25px;
    color: #ffd4d4;
    max-width: 280px;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: auto;
    backdrop-filter: blur(10px);
  }
  
  #info-panel.visible {
    opacity: 1;
  }
  
  #info-panel h3 {
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: #ffb4c8;
    text-shadow: 0 0 10px rgba(255, 180, 200, 0.5);
  }
  
  #info-panel p {
    font-size: 0.9rem;
    line-height: 1.6;
    color: rgba(255, 220, 220, 0.85);
  }
  
  #loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 1s ease;
  }
  
  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  
  .loader {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(255, 180, 200, 0.2);
    border-top-color: #ffb4c8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  
  #loading p {
    margin-top: 20px;
    color: #ffd4d4;
    letter-spacing: 0.2em;
    font-size: 0.9rem;
  }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.4; }
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  /* Particle effects */
  .sakura-petal {
    position: fixed;
    width: 12px;
    height: 12px;
    background: radial-gradient(ellipse at center, #ffb4c8 0%, #ff8fab 50%, transparent 70%);
    border-radius: 50% 0 50% 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    animation: fall linear forwards;
  }
  
  @keyframes fall {
    0% {
      opacity: 0;
      transform: translateY(-20px) rotate(0deg);
    }
    10% {
      opacity: 0.8;
    }
    90% {
      opacity: 0.6;
    }
    100% {
      opacity: 0;
      transform: translateY(100vh) rotate(720deg);
    }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <p>読み込み中...</p>
</div>

<div id="canvas-container"></div>

<div id="ui-overlay">
  <div id="title">日本世界</div>
  <div id="hint">drag to orbit · click objects to interact · scroll to zoom</div>
  <div id="info-panel">
    <h3 id="info-title">Welcome</h3>
    <p id="info-text">Explore this peaceful voxel world inspired by Japanese aesthetics.</p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x2d1b4e, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 35);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 10;
controls.maxDistance = 80;
controls.target.set(0, 2, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x4a3a6a, 0.6);
scene.add(ambientLight);

const moonLight = new THREE.DirectionalLight(0xc9b8ff, 1.2);
moonLight.position.set(-20, 30, 10);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.left = -50;
moonLight.shadow.camera.right = 50;
moonLight.shadow.camera.top = 50;
moonLight.shadow.camera.bottom = -50;
scene.add(moonLight);

const warmLight = new THREE.PointLight(0xffaa66, 0.8, 50);
warmLight.position.set(5, 8, 5);
scene.add(warmLight);

const pinkLight = new THREE.PointLight(0xff66aa, 0.5, 40);
pinkLight.position.set(-10, 5, -5);
scene.add(pinkLight);

// Ground
const groundGeometry = new THREE.CircleGeometry(60, 64);
const groundMaterial = new THREE.MeshStandardMaterial({ 
  color: 0x1a3a2a,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Water pond
const waterGeometry = new THREE.CircleGeometry(8, 32);
const waterMaterial = new THREE.MeshStandardMaterial({
  color: 0x2a4a6a,
  roughness: 0.2,
  metalness: 0.8,
  transparent: true,
  opacity: 0.7
});
const water = new THREE.Mesh(waterGeometry, waterMaterial);
water.rotation.x = -Math.PI / 2;
water.position.set(-8, 0.05, 8);
scene.add(water);

// Interactive objects tracking
const interactiveObjects = [];
const objectInfo = {
  'torii': { title: '鳥居 Torii', text: 'Sacred gate marking the transition from mundane to sacred space. Common at Shinto shrines.' },
  'pagoda': { title: '塔 Pagoda', text: 'Multi-tiered tower originating from Buddhist stupas. Each level represents a element.' },
  'temple': { title: '寺 Temple', text: 'Place of worship and meditation. Architecture blends Japanese and Buddhist styles.' },
  'shrine': { title: '神社 Shrine', text: 'Shinto place of worship. Home to kami (spirits) and sacred objects.' },
  'cherry': { title: '桜 Cherry Blossom', text: 'Sakura symbolizes the transient nature of life. Celebrated during hanami season.' },
  'bamboo': { title: '竹 Bamboo', text: 'Symbol of strength and flexibility. Used in architecture, art, and daily life.' },
  'lantern': { title: '灯籠 Lantern', text: 'Traditional lighting element. Stone lanterns guide paths in gardens and temples.' },
  'fuji': { title: '富士山 Mount Fuji', text: 'Japan\'s sacred mountain. Active volcano and symbol of beauty and endurance.' },
  'koi': { title: '鯉 Koi', text: 'Colorful carp symbolizing perseverance, strength, and good fortune.' },
  'gate': { title: '門 Gate', text: 'Castle and fortress gates. Architectural marvels of feudal Japan.' },
  'default': { title: 'Voxel Object', text: 'A piece of this peaceful voxel world.' }
};

// Raycaster for interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredObject = null;
let selectedObject = null;

// Load models
const loader = new GLTFLoader();

const models = [
  { url: './japanese-torii.glb', pos: [0, 0, -12], scale: 2, category: 'torii' },
  { url: './torii-gate-1.glb', pos: [15, 0, -8], scale: 1.5, category: 'torii' },
  { url: './torii-gate-2.glb', pos: [-18, 0, -5], scale: 1.8, category: 'torii' },
  { url: './pagoda-1.glb', pos: [12, 0, 10], scale: 1.5, category: 'pagoda' },
  { url: './pagoda-2.glb', pos: [-15, 0, 12], scale: 2, category: 'pagoda' },
  { url: './pagoda-3.glb', pos: [20, 0, -15], scale: 1.8, category: 'pagoda' },
  { url: './temple-1.glb', pos: [-8, 0, -18], scale: 2, category: 'temple' },
  { url: './temple-2.glb', pos: [8, 0, 18], scale: 1.5, category: 'temple' },
  { url: './temple-3.glb', pos: [-20, 0, 0], scale: 1.8, category: 'temple' },
  { url: './shrine-a68qNnAC4m-.glb', pos: [5, 0, -20], scale: 2, category: 'shrine' },
  { url: './shrine-tFxdxO5clk.glb', pos: [-12, 0, 15], scale: 1.5, category: 'shrine' },
  { url: './cherry-tree.glb', pos: [-5, 0, 5], scale: 1.5, category: 'cherry' },
  { url: './big-sakura-bonsai.glb', pos: [10, 0, 3], scale: 1.2, category: 'cherry' },
  { url: './sakura-tree.glb', pos: [-18, 0, -12], scale: 1.8, category: 'cherry' },
  { url: './bamboo-1.glb', pos: [18, 0, 5], scale: 1.5, category: 'bamboo' },
  { url: './bamboo-2.glb', pos: [-22, 0, 8], scale: 2, category: 'bamboo' },
  { url: './mount-fuji.glb', pos: [0, 0, 25], scale: 3, category: 'fuji' },
  { url: './red-lantern.glb', pos: [3, 2, -8], scale: 1.2, category: 'lantern' },
  { url: './post-lantern.glb', pos: [-3, 0, -10], scale: 1.5, category: 'lantern' },
  { url: './bonbori-clVUEgVMIiX.glb', pos: [8, 0, -5], scale: 1, category: 'lantern' },
  { url: './bonbori-dcnV-eqevIB.glb', pos: [-10, 0, -3], scale: 1.2, category: 'lantern' },
  { url: './japanese-stone-lamp.glb', pos: [15, 0, 0], scale: 1.5, category: 'lantern' },
  { url: './koi-fish.glb', pos: [-8, 0.3, 8], scale: 1, category: 'koi' },
  { url: './castle-gate.glb', pos: [22, 0, -20], scale: 2, category: 'gate' },
  { url: './wooden-fortress-gate.glb', pos: [-25, 0, -18], scale: 1.8, category: 'gate' },
  { url: './japanese-room.glb', pos: [0, 0, 0], scale: 1.5, category: 'temple' },
  { url: './stonepath-5BPCPOycxC.glb', pos: [6, 0, 12], scale: 1.5, category: 'default' },
  { url: './stonepath-gYhoEOKItJ.glb', pos: [-6, 0, 14], scale: 1.5, category: 'default' },
];

let loadedCount = 0;
const totalModels = models.length;

function updateLoading() {
  loadedCount++;
  if (loadedCount >= totalModels) {
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 500);
  }
}

console.log(`Starting to load ${models.length} models...`);

models.forEach((config, index) => {
  console.log(`[${index + 1}/${models.length}] Loading: ${config.url}`);
  
  loader.load(
    config.url,
    (gltf) => {
      console.log(`✓ Loaded: ${config.url}`);
      const model = gltf.scene;
      model.position.set(...config.pos);
      model.scale.setScalar(config.scale);
      model.userData.category = config.category;
      model.userData.originalY = config.pos[1];
      model.userData.originalScale = config.scale;
      
      // Enable shadows
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      scene.add(model);
      interactiveObjects.push(model);
      console.log(`  Added to scene. Total objects: ${interactiveObjects.length}`);
      updateLoading();
    },
    (progress) => {
      if (progress.lengthComputable) {
        const percent = (progress.loaded / progress.total * 100).toFixed(1);
        console.log(`  Progress: ${percent}%`);
      }
    },
    (error) => {
      console.error(`✗ Failed to load ${config.url}:`, error);
      updateLoading();
    }
  );
});

// Fallback if models don't load - create simple voxel placeholders
setTimeout(() => {
  if (loadedCount < totalModels / 2) {
    console.log('Creating fallback voxel objects...');
    createFallbackScene();
  }
}, 5000);

function createFallbackScene() {
  const colors = [0xff6b6b, 0xffd93d, 0x6bcf7f, 0x4d96ff, 0xff6bcb];
  
  models.forEach((config, i) => {
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshStandardMaterial({ 
      color: colors[i % colors.length],
      roughness: 0.7,
      metalness: 0.3
    });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(...config.pos);
    cube.position.y = 1;
    cube.scale.setScalar(config.scale);
    cube.castShadow = true;
    cube.receiveShadow = true;
    cube.userData.category = config.category;
    cube.userData.originalY = 1;
    cube.userData.originalScale = config.scale;
    scene.add(cube);
    interactiveObjects.push(cube);
  });
  
  document.getElementById('loading').classList.add('hidden');
}

// Sakura petals
function createSakuraPetal() {
  const petal = document.createElement('div');
  petal.className = 'sakura-petal';
  petal.style.left = Math.random() * 100 + '%';
  petal.style.animationDuration = (Math.random() * 5 + 8) + 's';
  petal.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(petal);
  
  setTimeout(() => petal.remove(), 15000);
}

setInterval(createSakuraPetal, 800);

// Mouse interaction
function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onClick(event) {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(interactiveObjects, true);
  
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj.parent && !obj.userData.category) {
      obj = obj.parent;
    }
    
    if (obj.userData.category) {
      selectObject(obj);
    }
  } else {
    deselectObject();
  }
}

function selectObject(obj) {
  // Deselect previous
  if (selectedObject && selectedObject !== obj) {
    animateScale(selectedObject, selectedObject.userData.originalScale);
    animateY(selectedObject, selectedObject.userData.originalY);
  }
  
  selectedObject = obj;
  const category = obj.userData.category;
  const info = objectInfo[category] || objectInfo.default;
  
  // Animate selection
  animateScale(obj, obj.userData.originalScale * 1.2);
  animateY(obj, obj.userData.originalY + 1);
  
  // Show info panel
  document.getElementById('info-title').textContent = info.title;
  document.getElementById('info-text').textContent = info.text;
  document.getElementById('info-panel').classList.add('visible');
  
  // Create particle burst
  createParticleBurst(obj.position);
}

function deselectObject() {
  if (selectedObject) {
    animateScale(selectedObject, selectedObject.userData.originalScale);
    animateY(selectedObject, selectedObject.userData.originalY);
    selectedObject = null;
  }
  document.getElementById('info-panel').classList.remove('visible');
}

function animateScale(obj, targetScale) {
  const startScale = obj.scale.x;
  const startTime = Date.now();
  const duration = 300;
  
  function update() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const newScale = startScale + (targetScale - startScale) * eased;
    obj.scale.setScalar(newScale);
    if (progress < 1) requestAnimationFrame(update);
  }
  update();
}

function animateY(obj, targetY) {
  const startY = obj.position.y;
  const startTime = Date.now();
  const duration = 400;
  
  function update() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    obj.position.y = startY + (targetY - startY) * eased;
    if (progress < 1) requestAnimationFrame(update);
  }
  update();
}

function createParticleBurst(position) {
  const particleCount = 20;
  const particles = [];
  
  for (let i = 0; i < particleCount; i++) {
    const geometry = new THREE.SphereGeometry(0.1, 8, 8);
    const material = new THREE.MeshBasicMaterial({ 
      color: new THREE.Color().setHSL(0.9 + Math.random() * 0.1, 0.8, 0.6),
      transparent: true,
      opacity: 1
    });
    const particle = new THREE.Mesh(geometry, material);
    particle.position.copy(position);
    particle.position.y += 2;
    particle.userData.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.2 + 0.1,
      (Math.random() - 0.5) * 0.3
    );
    particle.userData.life = 1;
    scene.add(particle);
    particles.push(particle);
  }
  
  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.position.add(p.userData.velocity);
      p.userData.velocity.y -= 0.01;
      p.userData.life -= 0.02;
      p.material.opacity = p.userData.life;
      
      if (p.userData.life <= 0) {
        scene.remove(p);
        particles.splice(i, 1);
      }
    }
    if (particles.length > 0) requestAnimationFrame(updateParticles);
  }
  updateParticles();
}

// Hover effect
function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(interactiveObjects, true);
  
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj.parent && !obj.userData.category) {
      obj = obj.parent;
    }
    
    if (obj.userData.category && obj !== selectedObject) {
      if (hoveredObject !== obj) {
        if (hoveredObject && hoveredObject !== selectedObject) {
          animateScale(hoveredObject, hoveredObject.userData.originalScale);
        }
        hoveredObject = obj;
        animateScale(obj, obj.userData.originalScale * 1.05);
        document.body.style.cursor = 'pointer';
      }
    }
  } else {
    if (hoveredObject && hoveredObject !== selectedObject) {
      animateScale(hoveredObject, hoveredObject.userData.originalScale);
    }
    hoveredObject = null;
    document.body.style.cursor = 'default';
  }
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const time = clock.getElapsedTime();
  
  // Animate water
  water.material.opacity = 0.6 + Math.sin(time * 2) * 0.1;
  
  // Gentle floating animation for objects
  interactiveObjects.forEach((obj, i) => {
    if (obj !== selectedObject) {
      obj.position.y = obj.userData.originalY + Math.sin(time + i) * 0.1;
    }
    obj.rotation.y += 0.001;
  });
  
  // Animate lights
  warmLight.intensity = 0.8 + Math.sin(time * 3) * 0.2;
  pinkLight.position.x = Math.sin(time * 0.5) * 15;
  pinkLight.position.z = Math.cos(time * 0.5) * 15;
  
  updateHover();
  controls.update();
  renderer.render(scene, camera);
}

// Event listeners
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();

// Hide loading after timeout even if models fail
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 8000);
</script>

</body>
</html>
